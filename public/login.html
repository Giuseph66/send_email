<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Emails</title>
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-envelope"></i>
                </div>
                <h1>Gerenciador de Emails</h1>
                <p>Cadastre ou acesse seu painel com sua conta Google</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <button type="button" class="login-btn" id="loginGoogleBtn">
                    <i class="fab fa-google"></i>
                    Entrar com Google
                </button>
                <button type="button" class="login-btn login-btn-secondary" id="registerGoogleBtn">
                    <i class="fas fa-user-plus"></i>
                    Cadastrar conta Google
                </button>
            </form>
            
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Verificando sessão...</p>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="login.js"></script>
</body>
</html>
